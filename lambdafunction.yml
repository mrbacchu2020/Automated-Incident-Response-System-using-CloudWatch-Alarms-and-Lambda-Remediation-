import boto3

def lambda_handler(event, context):

    ec2 = boto3.client('ec2')

    instance_id = "i-0fdd1734cb647905e"

    response = ec2.reboot_instances(
        InstanceIds=[instance_id]
    )

    print("EC2 instance restarted:", instance_id)

    return {
        'statusCode': 200,
        'body': "Remediation action executed"
    }
